<!-- ============================================================
     SECTION 1: HERO
     ============================================================ -->
<style>
  .hero {
    position: relative;
    min-height: 100svh;
    min-height: 100vh; /* fallback */
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    overflow: hidden;
    padding: 2rem 1.25rem 4rem;
  }

  .hero__bg {
    position: absolute;
    inset: 0;
    background-image: url('img/patagonia.jpg');
    background-size: cover;
    background-position: center 40%;
    background-repeat: no-repeat;
    z-index: 0;
  }

  /* Double overlay: deep black bottom, slightly lighter top */
  .hero__bg::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(
      to bottom,
      rgba(10,10,10,0.55) 0%,
      rgba(10,10,10,0.45) 40%,
      rgba(10,10,10,0.75) 100%
    );
  }

  .hero__content {
    position: relative;
    z-index: 1;
    max-width: 720px;
    width: 100%;
  }

  .hero__logo {
    width: 320px;
    height: auto;
    margin: 0 auto 1.75rem;
  }

  .hero__eyebrow {
    font-family: var(--font-accent);
    font-size: 1.4rem;
    color: var(--red-light);
    letter-spacing: 0.02em;
    margin-bottom: 0.5rem;
  }

  .hero__title {
    font-family: var(--font-display);
    font-size: clamp(2.8rem, 9vw, 5.5rem);
    line-height: 1.05;
    color: var(--white);
    margin-bottom: 1.25rem;
    text-shadow: 0 2px 20px rgba(0,0,0,0.5);
  }

  .hero__subtitle {
    font-family: var(--font-body);
    font-size: clamp(1rem, 3vw, 1.2rem);
    color: rgba(255,255,255,0.85);
    letter-spacing: 0.04em;
    text-transform: uppercase;
    margin-bottom: 2.5rem;
  }


  .hero__date {
    font-family: var(--font-body);
    font-size: clamp(1.1rem, 3.5vw, 1.4rem);
    font-weight: 700;
    color: var(--white);
    letter-spacing: 0.03em;
    margin-bottom: 2.5rem;
  }

  .hero__cta {
    display: inline-block;
    background: var(--red);
    color: var(--white);
    font-family: var(--font-body);
    font-size: 1.1rem;
    font-weight: 700;
    letter-spacing: 0.03em;
    padding: 1rem 2.25rem;
    border-radius: var(--radius-sm);
    border: 2px solid var(--red);
    cursor: pointer;
    transition: background var(--transition), transform var(--transition), box-shadow var(--transition);
    animation: pulse-cta 2.8s ease-in-out infinite;
  }

  .hero__cta:hover,
  .hero__cta:focus {
    background: var(--red-dark);
    border-color: var(--red-dark);
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(204,0,0,0.45);
    animation: none;
  }

  @keyframes pulse-cta {
    0%, 100% { box-shadow: 0 0 0 0 rgba(204,0,0,0.5); }
    50%       { box-shadow: 0 0 0 10px rgba(204,0,0,0); }
  }

  .hero__deadline {
    margin-top: 1rem;
    font-size: 0.9rem;
    color: rgba(255,255,255,0.6);
    letter-spacing: 0.02em;
  }

  .hero__scroll {
    position: absolute;
    bottom: 1.75rem;
    left: 50%;
    transform: translateX(-50%);
    z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    color: rgba(255,255,255,0.5);
    font-size: 0.78rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  .hero__scroll-arrow {
    width: 20px;
    height: 20px;
    border-right: 2px solid rgba(255,255,255,0.4);
    border-bottom: 2px solid rgba(255,255,255,0.4);
    transform: rotate(45deg);
    animation: bounce-arrow 1.6s ease-in-out infinite;
  }

  @keyframes bounce-arrow {
    0%, 100% { transform: rotate(45deg) translateY(0); opacity: 0.4; }
    50%       { transform: rotate(45deg) translateY(5px); opacity: 0.9; }
  }

  @media (max-width: 640px) {
    .hero__logo { width: 220px; }
  }
</style>

<section class="hero" id="top">
  <div class="hero__bg" role="img" aria-label="Fitz Roy Bergpanorama in El Chaltén, Patagonien"></div>

  <div class="hero__content">
    <img src="img/logo.png" alt="Bierfamilie Patagonia Logo" class="hero__logo">
    <p class="hero__eyebrow">Bierfamilie Patagonia</p>
    <h1 class="hero__title">Patagonia-Reise 2027</h1>
    <p class="hero__subtitle">Buenos Aires &nbsp;·&nbsp; El Calafate &nbsp;·&nbsp; El Chaltén</p>
    <p class="hero__date">5.–14. Februar 2027</p>
    <a href="https://forms.gle/A1EzFYUe6viYs1E27" class="hero__cta" target="_blank" rel="noopener">
      Jetzt anmelden
    </a>
    <p class="hero__deadline">Verbindliche Anmeldung bis 30. April 2026</p>
  </div>

  <div class="hero__scroll" aria-hidden="true">
    <span>Mehr</span>
    <div class="hero__scroll-arrow"></div>
  </div>
</section>
